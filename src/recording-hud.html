<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vi-VibeVoice · Recording</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        align-items: stretch;
        justify-content: stretch;
        padding: 0;
        background: transparent;
      }
      .hud {
        flex: 1;
        margin: 0;
        padding: 14px 16px;
        border-radius: 16px;
        background: rgba(8, 21, 33, 0.92);
        border: 1px solid rgba(77, 212, 198, 0.35);
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        gap: 14px;
        cursor: default;
        -webkit-app-region: drag;
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        flex-shrink: 0;
        background: #4dd4c6;
        box-shadow: 0 0 12px rgba(77, 212, 198, 0.7);
      }
      .dot.pulse {
        animation: pulse 1.1s ease-in-out infinite;
      }
      .dot.err {
        background: #ff6b6b;
        box-shadow: 0 0 10px rgba(255, 107, 107, 0.55);
        animation: none;
      }
      .dot.ok {
        background: #69db7c;
        animation: none;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.65;
          transform: scale(0.92);
        }
      }
      .text {
        min-width: 0;
        flex: 1;
      }
      .title {
        font-size: 14px;
        font-weight: 700;
        color: #f3f8fc;
        line-height: 1.25;
      }
      .sub {
        font-size: 12px;
        color: #9eb7cb;
        margin-top: 3px;
        line-height: 1.3;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
    </style>
  </head>
  <body>
    <div class="hud" id="hud">
      <div class="dot" id="dot" aria-hidden="true"></div>
      <div class="text">
        <div class="title" id="title">Vi-VibeVoice</div>
        <div class="sub" id="sub"></div>
      </div>
    </div>
    <script>
      const dot = document.getElementById("dot");
      const titleEl = document.getElementById("title");
      const subEl = document.getElementById("sub");

      function apply(data) {
        if (!data) return;
        titleEl.textContent = data.title || "Vi-VibeVoice";
        subEl.textContent = data.subtitle || "";
        dot.className = "dot";
        if (data.dot === "error") dot.classList.add("err");
        else if (data.dot === "success") dot.classList.add("ok");
        else if (data.pulse) dot.classList.add("pulse");
      }

      if (window.hudApi && window.hudApi.onRender) {
        window.hudApi.onRender(apply);
      }
    </script>
  </body>
</html>
